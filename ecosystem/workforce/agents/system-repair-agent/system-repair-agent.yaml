name: system-repair-agent
version: 1.0.0
status: active
description: "Automatically detect and fix OmniClaw system errors: encoding corruption, broken paths, stale naming, MCP failures, registry inconsistencies"
domain: ecosystem
type: workforce-agent
department: system_integrity
tier: 1

skills:
  - system_autofix
  - shell_assistant
  - observability
  - reasoning_engine

tools:
  - file-system
  - shell
  - web_search

context:
  - Read system_prompt.md for full operating instructions
  - Memory: brain/corp/memory/agents/system-repair-agent.md
  - Full agent spec: brain/agents/system-repair-agent.md
  - Knowledge: brain/knowledge/notes/KI-SYSTEM-REPAIR-01.md
  - Workflow: system/ops/workflows/system-repair.md
  - Reports to: strix-agent → ceo-agent

runtime:
  type: antigravity
  memory: ltm
  bus: event_bus.db

routing:
  domain: system-integrity-repair
  triggers:
    - "audit system"
    - "fix system"
    - "scan and fix"
    - "system check"
    - "fix system errors"
    - "omniclaw repair"
    - "omniclaw repair"
  events:
    - boot_sequence_missing_files
    - ci_cd_encoding_failure
  schedule: daily
  fallback: orchestrator_pro

autonomy: supervised_with_auto_execute
blocked_actions:
  - delete_file
  - edit_tier0_files
  - edit_secrets
  - push_to_remote
  - mass_operation_gt_50_files

metadata:
  created: 2026-03-29
  version: v1.0
  manually_crafted: true
  ceo_approved: true
  strix_approved: true
  activated_by: CEO (manual craft) + omniclaw_activate_agents.py finalization