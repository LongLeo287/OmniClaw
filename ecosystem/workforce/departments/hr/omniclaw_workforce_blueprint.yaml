channel-agent:
  title: Channel Distribution Manager
  dept: marketing
  tier: 2
  description: 'Manage and optimize content distribution channels: YouTube, Blog, Telegram,
    Social Media'
  skills:
  - neural_navigator
  - sequential-thinking
  - content-scheduler
  - analytics-reader
  tools:
  - file-system
  - web_search
  - telegram-api
  - youtube-api
  routing_domain: channel-distribution
  responsibilities:
  - Schedule and distribute multi-channel content according to marketing strategy
  - Monitor channel performance (views, engagement, subscribers)
  - Coordinate with content-agent and editor-agent to ensure quality of broadcast content
    onions
  - Weekly channel KPI reporting to marketing-lead-agent
  - Automate posting schedule and cross-platform promotion
  kpis:
  - channel_growth_rate
  - engagement_rate
  - content_distribution_coverage
cost-manager-agent:
  title: Cost & Budget Controller
  dept: finance
  tier: 2
  description: OmniClaw operating cost control, API budget management, optimization
    Maximize the ROI of the entire system
  skills:
  - neural_navigator
  - sequential-thinking
  - cost-analyzer
  - budget-forecaster
  tools:
  - file-system
  - web_search
  - shell
  routing_domain: cost-control
  responsibilities:
  - Track and report API costs (OpenAI, Anthropic, Google) by day/week/month
  - Set cost warning thresholds and trigger alerts when budget is exceeded
  - Propose optimization (switch models, caching, batching) to reduce costs
  - Prepare ROI reports for each project and each department
  - Manage spending limits for each agent by tier
  kpis:
  - api_cost_per_task
  - monthly_budget_adherence
  - cost_optimization_ratio
editor-agent:
  title: Content Editor & Proofreader
  dept: content_review
  tier: 2
  description: Edit, quality check and standardize all output content of
