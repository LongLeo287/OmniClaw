  skills:
  - neural_navigator
  - sequential-thinking
  - grammar-checker
  - style-enforcer
  tools:
  - file-system
  - web_search
  routing_domain: content-editing
  responsibilities:
  - Check grammar, spelling and sentence structure for every output draft
  - Ensure content complies with OmniClaw Corp's brand voice and tone
  - Review and approve content from content-agent before publishing
  - Maintain style guide and update according to actual feedback
  - Coordinate with channel-agent to prepare appropriate content for each channel
  kpis:
  - edit_accuracy_rate
  - content_approval_time
  - style_compliance_score
health-chief-agent:
  title: System Health Chief
  dept: system_health
  tier: 2
  description: 'Monitor the entire OmniClaw system health: uptime, memory leaks,
    performance bottlenecks'
  skills:
  - neural_navigator
  - sequential-thinking
  - system-monitor
  - anomaly-detector
  tools:
  - file-system
  - shell
  - web_search
  routing_domain: system-health
  responsibilities:
  - Continuously monitor uptime and response time of all services
  - Detect and warn of memory leaks, CPU spikes, disk overflow
  - Coordinate automatic restart/recovery when serious errors are detected
  - Maintain health dashboard and submit daily health reports
  - Coordinate with sre-agent in incident and postmortem handling
  kpis:
  - system_uptime
  - mean_time_to_recovery
  - incident_detection_latency
