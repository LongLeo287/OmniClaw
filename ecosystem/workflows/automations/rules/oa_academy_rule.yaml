id: oa_academy_rule
name: OmniClaw Academy (OA) Self-Learning Governance
description: Strict governance rules for OA regarding post-mortem analysis and system evolution.
version: "1.0"
enforcement_level: CRITICAL
owner: oa-chief-agent

rules:
  - id: RULE-OA-01
    name: Exclusive Analysis Right
    category: self-learning
    condition: "When structurally broken JSON or logs exist in FAILED_QUARANTINE."
    action: "ONLY OA is permitted to read, analyze, and extract lessons from quarantine. OHD is strictly a garbage collector."
    
  - id: RULE-OA-02
    name: Rule Generation
    category: evolution
    condition: "Upon concluding a post-mortem analysis (e.g. why an Agent crashed)."
    action: "OA MUST generate a permanent Rule in system/automations/rules/ or update lessons_learned.md so the ecosystem never repeats the error."

  - id: RULE-OA-03
    name: Disposal Certification
    category: security
    condition: "After a piece of trash has been fully analyzed and lessons extracted."
    action: "OA tags the file with POST_MORTEM_DONE: TRUE and leaves it in Quarantine. OA is NEVER allowed to execute DELETE. Only CEO can Empty Trash."

  - id: RULE-OA-04
    name: Mandatory Ecosystem Up-skilling
    category: evolution
    condition: "When OA publishes a new Lesson/Rule to brain/knowledge/lessons_learned.md."
    action: "ALL ecosystem Agents (Heads of Depts, Staff) MUST periodically sync with OA to 'download' the latest patches and upgraded knowledge. Nobody is exempt from learning."

  - id: RULE-OA-05
    name: Omniscient Mapping & Memory
    category: operations
    condition: "When attempting to locate an entity or recall a historical crash."
    action: "OA uses registry-manager-agent for 0.1s instant Map lookup (SYSTEM_INDEX.yaml). OA uses mcp_memory and lightrag_server to perfectly recall historical bugs with top-tier persistence (Nhớ dai, Nhớ sâu, Nhớ vĩnh viễn)."

  - id: RULE-OA-06
    name: External Knowledge Evolution (Repo Updates)
    category: evolution
    condition: "When the Weekly Repo Radar detects new releases (e.g. Supabase v2.30) from Tier-1 tracked GitHub repositories."
    action: "OA MUST command OIW (OmniClaw Ingestion Workflow / OID) to scrape and ingest the new documentation immediately to keep the OS Encyclopedia state-of-the-art."

faculty_joint_department:
  chief_director: oa-chief-agent
  think_tanks:
    - cognitive_reflector
    - rd-lead-agent
  librarians:
    - knowledge_agent
    - archivist
    - registry-manager-agent
  surgeons:
    - backend-architect-agent
    - omniclaw-architect
  memory_weapons:
    - lightrag_server
    - memory_daemon (Mem0)
    - mcp_memory
  evaluation_engines:
    - omniclaw_auto_evaluator.py (Fast Quality Checker)
    - omniclaw_deep_evaluator.py (Comprehensive Code Analysis)
    - omniclaw_code_polisher.py (Auto-Refactoring & Polishing)
    - omniclaw_repo_analyzer.py (Repository-wide Architectural Audit)
  evolution_engines:
    - repo_update_monitor.py (Github Release & Commit Tracking)
  surgical_tools:
    - deep_rename.py (Rule Naming Convention Fixer)
    - omniclaw_path_fixer.py (Broken Hardpath Healer)
    - restore_links.py (Markdown Dead-Link Sutures)
    - fix_encoding_bom.ps1 (UTF-8 Font Corruptions Fixer)

pipelines:
  # Internal Pipeline reference mapped for OA responses
  - name: oa_learning_pipeline
    steps:
      1: "OA receives JSON Ticket from OA_DISPATCH_QUEUE"
      2: "oa-chief-agent wakes up and reads FAILED_QUARANTINE files"
      3: "OA invokes OmniClaw Coder Model to diagnose the exact crash root cause"
      4: "OA writes new defensive Rules / updates Memory"
      5: "OA tags Trash as DONE, awaiting CEO deletion"
