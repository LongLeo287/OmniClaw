# OmniClaw Corp — OpenClaw Skill Router
# Inspired by OpenClaw (🦞) Typed Pipeline Architecture
# Each pipeline type maps to a set of Workflows + Agents

version: "1.0"
schema: openclaw-pipeline-v1

pipelines:

  CODE:
    keywords: [code, write, fix, bug, debug, build, app, feature, refactor, test, deploy, push, git]
    description: "Create/edit code, build app, deploy"
    workflows:
      - ops/workflows/create-plugin.md
      - ops/workflows/build-fast-index.md
    agent: antigravity
    tool_hint: "shell + file_write"

  DESIGN:
    keywords: [design, ui, ux, interface, colors, layout, figma, css, component, dashboard]
    description: "UI/UX design, interface"
    workflows:
      - ops/workflows/nemoclaw-slides.md
    agent: nemoclaw
    tool_hint: "file_write + web_fetch"

  DATA:
    keywords: [data, database, sql, supabase, json, csv, analysis, report, report, analytics, query]
    description: "Data query, analysis"
    workflows:
      - ops/workflows/data-ingest.md
    agent: antigravity
    tool_hint: "shell + web_fetch"

  RESEARCH:
    keywords: [learn, research, search, compare, evaluate, review, explain, explain, what]
    description: "Search, explain, research"
    agent: antigravity
    tool_hint: "web_search + file_read"

  OPS:
    keywords: [start, restart, stop, deploy, docker, service, task, monitor, log, health, check]
    description: "System operation, service management"
    workflows:
      - ops/workflows/bot-reporting.md
      - ops/workflows/start-services.md
    agent: omniclaw_bot
    tool_hint: "shell"

  PLAN:
    keywords: [plan, plan, roadmap, okr, sprint, brainstorm, idea, idea, strategy]
    description: "Planning, brainstorming"
    agent: antigravity
    tool_hint: "file_write"

  CHAT:
    keywords: []
    description: "Common conversation, quick questions"
    agent: omniclaw_bot
    tool_hint: "none — respond directly"
