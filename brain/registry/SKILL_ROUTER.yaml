# The 8-Daemon OmniClaw Skill Router
# Authoritative routing matrix for Execution Agents utilizing OER registered skills.

version: "5.0"
schema: omniclaw-pipeline-v5

pipelines:

  CODE_EXECUTION:
    keywords: [code, write, fix, bug, debug, build, app, feature, refactor, test, deploy, push, git]
    description: "Write code, execute deployments, and compile apps"
    workflows:
      - brain/rules/sops/workflow.md
    core_daemon_delegate: "OAP"
    agent_hints: "antigravity, cline, gemini"
    tool_hint: "shell + file_write + read_file"

  UI_DESIGN:
    keywords: [design, ui, ux, interface, colors, layout, figma, css, component, dashboard]
    description: "Generate frontend UI/UX logic and layouts"
    workflows:
      - core/docs/usage_guides/figma_mcp_usage.md
    core_daemon_delegate: "OAP"
    tool_hint: "file_write + mcp_figma"

  RESEARCH_AND_INTAKE:
    keywords: [scrape, search, github, clone, read, docs, learn, memory]
    description: "Scrape external repositories and save to MemPalace Layer 1"
    workflows:
      - brain/rules/sops/enrichment_sop.md
    core_daemon_delegate: "OIW"
    tool_hint: "web_fetch + git_clone + memory_write"

  CLEANUP_AND_HEAL:
    keywords: [clean, delete, cache, minify, json, logs, bloat]
    description: "Automatically purge massive logs and minify system indexes"
    workflows:
      - brain/rules/sops/orchestration_sop.md
    core_daemon_delegate: "OHD"
    tool_hint: "shell + file_delete"
