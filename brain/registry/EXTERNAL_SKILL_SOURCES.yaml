# ==========================================
# OmniClaw V5.0 | Protected by OSF Daemon
# ==========================================

registry_version: "ai-os-5.0"
generated_at: "dynamic"
description: >
  Catalog of external skill sources for OmniClaw.
  These sources are managed strictly by the OER Daemon.
  All fetched skills go to vault/tmp/sandbox/ for OSF review before promotion.

# Trust levels:
#   trusted  = vetted, safe to fetch
#   manual   = OAP Pipeline must authorize
#   quarantined = OSF has locked this source

defaults:
  fetch_policy:
    destination: "$OMNICLAW_ROOT/vault/tmp/sandbox/"
    auto_register: false
    require_user_confirmation: true
  safety_gates:
    - "no_executable_scripts"
    - "no_private_key_patterns"
    - "no_obfuscated_code"

sources:
  - id: mcp_official
    type: github
    url: "https://github.com/modelcontextprotocol"
    trust: trusted
    description: "Official MCP repositories for tool integration."
